<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>The Wedding Of Firdaus & Arini</title>
    <meta name="description" content="Tanpa Ecuadorian rasa hormat, izinkan kami mengundang Bapak/Ibu/Saudara/i ke acara akad nikah kami.">
    
    <meta property="og:url" content="https://firdanin.github.io/undangan/">
    <meta property="og:type" content="article">
    <meta property="og:title" content="The Wedding Of Firdaus & Arini">
    <meta property="og:description" content="Kamis, 04 Juni 2026 - Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i, teman sekaligus sahabat, untuk menghadiri acara pernikahan kami.">
    <meta property="og:image" content="https://firdanin.github.io/undangan/cover.jpg">
    <meta property="og:image:secure_url" content="https://firdanin.github.io/undangan/cover.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pancingan-box {
            text-align: center;
            color: #333333;
            padding: 30px;
            max-width: 400px;
            border: 1px solid #eaeaea;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            background: #faf8f5;
        }

        .salam {
            font-size: 14px;
            color: #777777;
            font-style: italic;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 28px;
            color: #8c7036;
            margin: 15px 0;
        }

        p {
            font-size: 14px;
            line-height: 1.6;
            color: #555555;
        }

        .waktu {
            font-weight: bold;
            color: #8c7036;
            margin-top: 15px;
        }

        /* ⬇️ TOMBOL DIKASIH ANIMASI BERGERAK (PULSE) ⬇️ */
        .btn-buka {
            background-color: #8c7036;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(140, 112, 54, 0.3);
            
            /* Menjalankan animasi bernama 'denyut' selama 1.5 detik berulang terus-menerus */
            animation: denyut 1.5s infinite ease-in-out; 
        }
        
        /* Rumus gerakan animasinya: membesar sedikit lalu mengecil kembali */
        @keyframes denyut {
            0% {
                transform: scale(1);
                box-shadow: 0 5px 15px rgba(140, 112, 54, 0.3);
            }
            50% {
                transform: scale(1.08); /* membesar 8% */
                box-shadow: 0 8px 25px rgba(140, 112, 54, 0.5); /* efek cahayanya makin kuat */
            }
            100% {
                transform: scale(1);
                box-shadow: 0 5px 15px rgba(140, 112, 54, 0.3);
            }
        }
        /* ⬆️ SELESAI ANIMASI TOMBOL ⬆️ */
        
        video {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 999;
            background-color: black;
        }
    </style>
</head>
<body>

    <div class="pancingan-box" id="boxPalsu">
        <p class="salam">Assalamualaikum Wr. Wb.</p>
        <p>Tanpa mengurangi rasa hormat, izinkan kami mengundang Bapak/Ibu/Saudara/i ke acara akad nikah kami:</p>
        
        <h1>Firdaus & Arini</h1>
        
        <p>Yang insya Allah akan dilaksanakan pada:</p>
        <p class="waktu">Kamis, 04 Juni 2026</p>
        
        <button class="btn-buka" id="tombolPrank">BUKA UNDANGAN</button>
    </div>

    <video id="jumpscare" src="setan.mp4" preload="auto" playsinline></video>

    <script>
        const tombol = document.getElementById('tombolPrank');
        const boxPalsu = document.getElementById('boxPalsu');
        const video = document.getElementById('jumpscare');

        tombol.addEventListener('click', function() {
            boxPalsu.style.display = 'none';
            video.style.display = 'block';
            video.volume = 1.0; 
            
            if (video.requestFullscreen) {
                video.requestFullscreen();
            } else if (video.webkitRequestFullscreen) {
                video.webkitRequestFullscreen();
            }
            
            video.play();
        });
    </script>
</body>
</html>
</body>
</html>
